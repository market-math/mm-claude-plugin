# Worktree Configuration
# Used by the ops repo worktree tooling at ops/git/worktree/.
# See the ops example for all available options:
#   ops/git/worktree/worktree.conf.example
#
# Usage (from this repo, with the ops shell helpers sourced):
#   createwt <branch-name> [base-branch]   # create a worktree at ../mm-claude-plugin-<name>
#   wt list                                # list worktrees

# Required settings
# -----------------

# Worktree directory naming: ../${PROJECT_PREFIX}-${name}
PROJECT_PREFIX="mm-claude-plugin"

# Default branch to create worktrees from
DEFAULT_BRANCH="main"

# Docker / Django settings intentionally omitted: this is a Markdown + Python
# plugin repo with no containers. With NETWORK_NAME unset, the tooling skips all
# compose / DB / celery generation. MAIN_CONTAINER_NAME is likewise omitted, so
# the djangosh / djangoshp helpers are not usable from this repo (expected).
